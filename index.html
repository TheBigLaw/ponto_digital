<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ponto Digital</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    :root {
      --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0; --input-bg: #f8fafc;
      --blue: #3b82f6; --blue-hover: #2563eb; --text: #1e293b; --text-light: #475569; --muted: #94a3b8;
      --mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
    input, select, button { font-family: inherit; }
    select option { background: var(--card); color: var(--text); }
    input:focus, select:focus { border-color: var(--blue) !important; box-shadow: 0 0 0 3px rgba(59,130,246,.1); outline: none; }
    button { transition: all .15s ease; } button:hover { opacity: .88; } button:active { transform: scale(.98); }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes toastIn { from { opacity:0; transform: translate(-50%,-16px); } to { opacity:1; transform: translate(-50%,0); } }
    @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
    @keyframes modalIn { from { opacity:0; transform: scale(.95); } to { opacity:1; transform: scale(1); } }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ═══════════════════ FIREBASE REST API ═══════════════════
    const PROJECT_ID = "ponto-digital-equilibrium";
    const API_KEY = "AIzaSyDDw1MNrG8UVIS6Z2wWvup7xK1KKYMNRn0";
    const FB = "https://firestore.googleapis.com/v1/projects/" + PROJECT_ID + "/databases/(default)/documents";

    function toFsValue(v) {
      if (v === null || v === undefined) return { nullValue: null };
      if (typeof v === "boolean") return { booleanValue: v };
      if (typeof v === "number") return Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
      return { stringValue: String(v) };
    }
    function fromFsValue(v) {
      if ("stringValue" in v) return v.stringValue;
      if ("integerValue" in v) return parseInt(v.integerValue);
      if ("doubleValue" in v) return v.doubleValue;
      if ("booleanValue" in v) return v.booleanValue;
      return null;
    }
    function toFirestore(obj) {
      const fields = {};
      Object.entries(obj).forEach(function([k, v]) { if (k !== "id") fields[k] = toFsValue(v); });
      return { fields: fields };
    }
    function fromFirestore(doc) {
      const id = doc.name.split("/").pop();
      const obj = { id: id };
      if (doc.fields) Object.entries(doc.fields).forEach(function([k, v]) { obj[k] = fromFsValue(v); });
      return obj;
    }
    async function fbList(col) {
      var all = [];
      var pageToken = null;
      try {
        do {
          var url = FB + "/" + col + "?key=" + API_KEY + "&pageSize=5000";
          if (pageToken) url += "&pageToken=" + pageToken;
          var r = await fetch(url);
          if (!r.ok) throw new Error(r.statusText);
          var d = await r.json();
          all = all.concat((d.documents || []).map(fromFirestore));
          pageToken = d.nextPageToken || null;
        } while (pageToken);
        return all;
      } catch (e) { console.error("fbList:", e); return []; }
    }
    async function fbCreate(col, data, customId) {
      const url = customId ? FB+"/"+col+"?documentId="+customId+"&key="+API_KEY : FB+"/"+col+"?key="+API_KEY;
      const r = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(toFirestore(data)) });
      if (!r.ok) {
        var errText = await r.text().catch(function() { return r.statusText; });
        throw new Error("Erro ao salvar: " + errText);
      }
      return fromFirestore(await r.json());
    }
    async function fbUpdate(col, docId, data) {
      const mask = Object.keys(data).filter(function(k){return k!=="id";}).map(function(k){return "updateMask.fieldPaths="+k;}).join("&");
      const r = await fetch(FB+"/"+col+"/"+docId+"?"+mask+"&key="+API_KEY, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify(toFirestore(data)) });
      if (!r.ok) {
        var errText = await r.text().catch(function() { return r.statusText; });
        throw new Error("Erro ao atualizar: " + errText);
      }
      return fromFirestore(await r.json());
    }
    async function fbDelete(col, docId) {
      const r = await fetch(FB+"/"+col+"/"+docId+"?key="+API_KEY, { method: "DELETE" });
      if (!r.ok) {
        var errText = await r.text().catch(function() { return r.statusText; });
        throw new Error("Erro ao deletar: " + errText);
      }
      return true;
    }
    async function fbGet(col, docId) {
      try { const r = await fetch(FB+"/"+col+"/"+docId+"?key="+API_KEY); if (!r.ok) return null; return fromFirestore(await r.json()); }
      catch(e) { return null; }
    }

    // ═══════════════════ PDF ═══════════════════
    function generatePDF(emp, monthRecords, monthLabel) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const pw = doc.internal.pageSize.getWidth();
      doc.setFillColor(59,130,246); doc.rect(0,0,pw,38,"F");
      doc.setTextColor(255); doc.setFontSize(20); doc.setFont("helvetica","bold");
      doc.text("RELATÓRIO DE PONTO", pw/2, 18, { align: "center" });
      doc.setFontSize(11); doc.setFont("helvetica","normal");
      doc.text("Período: "+monthLabel, pw/2, 28, { align: "center" });
      doc.setTextColor(30,41,59); doc.setFontSize(12); doc.setFont("helvetica","bold");
      doc.text("Funcionário: "+emp.name, 14, 50);
      doc.setFont("helvetica","normal"); doc.setFontSize(10);
      doc.text("Cargo: "+(emp.cargo||"\u2014"), 14, 58);
      doc.text("Gerado em: "+new Date().toLocaleDateString("pt-BR")+" às "+new Date().toLocaleTimeString("pt-BR"), 14, 65);
      const groups = {};
      monthRecords.sort(function(a,b){return a.timestamp.localeCompare(b.timestamp);}).forEach(function(r) {
        const d = r.timestamp.slice(0,10); if (!groups[d]) groups[d]=[]; groups[d].push(r);
      });
      const rows = []; let totalMs = 0;
      Object.entries(groups).sort(function([a],[b]){return a.localeCompare(b);}).forEach(function([date, recs]) {
        const sorted = recs.sort(function(a,b){return a.timestamp.localeCompare(b.timestamp);});
        const entradas = sorted.filter(function(r){return r.type==="entrada";}).map(function(r){return fmtTime(r.timestamp);});
        const saidas = sorted.filter(function(r){return r.type==="saida";}).map(function(r){return fmtTime(r.timestamp);});
        let dayMs = 0;
        for (let i=0; i<sorted.length-1; i+=2) {
          if (sorted[i].type==="entrada" && sorted[i+1] && sorted[i+1].type==="saida")
            dayMs += new Date(sorted[i+1].timestamp).getTime() - new Date(sorted[i].timestamp).getTime();
        }
        totalMs += dayMs;
        const h = Math.floor(dayMs/3600000), m = Math.floor((dayMs%3600000)/60000);
        rows.push([fmtDateBR(date), entradas.join("\n"), saidas.join("\n"), h+"h "+String(m).padStart(2,"0")+"min"]);
      });
      doc.autoTable({ startY:74, head:[["Data","Entradas","Saídas","Horas Trab."]], body:rows,
        styles:{fontSize:9,cellPadding:4,lineColor:[226,232,240]}, headStyles:{fillColor:[59,130,246],textColor:255,fontStyle:"bold",fontSize:10},
        alternateRowStyles:{fillColor:[248,250,252]}, columnStyles:{0:{cellWidth:30,fontStyle:"bold"},3:{cellWidth:30,halign:"center",fontStyle:"bold"}}, margin:{left:14,right:14} });
      const finalY = doc.lastAutoTable.finalY+12;
      const totalH = Math.floor(totalMs/3600000), totalM = Math.floor((totalMs%3600000)/60000);
      doc.setFillColor(248,250,252); doc.roundedRect(14,finalY,pw-28,24,3,3,"F");
      doc.setDrawColor(59,130,246); doc.roundedRect(14,finalY,pw-28,24,3,3,"S");
      doc.setFontSize(12); doc.setFont("helvetica","bold"); doc.setTextColor(30,41,59);
      doc.text("TOTAL DE HORAS:", 20, finalY+15);
      doc.setTextColor(59,130,246); doc.text(totalH+"h "+String(totalM).padStart(2,"0")+"min", pw-20, finalY+15, {align:"right"});
      doc.text("("+Object.keys(groups).length+" dias)", pw/2, finalY+15, {align:"center"});
      const sigY = finalY+46; doc.setDrawColor(180,190,200); doc.setLineWidth(0.3);
      doc.line(14,sigY,90,sigY); doc.line(pw-90,sigY,pw-14,sigY);
      doc.setFontSize(8); doc.setTextColor(100,116,139); doc.setFont("helvetica","normal");
      doc.text("Assinatura do Funcionário",52,sigY+6,{align:"center"});
      doc.text("Assinatura do Responsável",pw-52,sigY+6,{align:"center"});
      doc.setFontSize(7); doc.setTextColor(160,170,180);
      doc.text("Documento gerado pelo sistema Ponto Digital",pw/2,doc.internal.pageSize.getHeight()-8,{align:"center"});
      doc.save("ponto-"+emp.name.replace(/\s+/g,"_")+"-"+monthLabel.replace("/","-")+".pdf");
    }

    // ═══════════════════ HELPERS ═══════════════════
    function fmtTime(iso) { return new Date(iso).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"}); }
    function fmtDateBR(iso) { const p=iso.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; }
    function isoDate(iso) { return iso.slice(0,10); }
    function todayISO() { const n=new Date(); return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0"); }
    function calcHours(recs) {
      let ms=0; const s=recs.slice().sort(function(a,b){return a.timestamp.localeCompare(b.timestamp);});
      for (let i=0;i<s.length-1;i+=2) if(s[i].type==="entrada"&&s[i+1]&&s[i+1].type==="saida") ms+=new Date(s[i+1].timestamp).getTime()-new Date(s[i].timestamp).getTime();
      return ms;
    }
    function fmtMs(ms) { const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000); return h+"h "+String(m).padStart(2,"0")+"min"; }

    // ═══════════════════ STYLES ═══════════════════
    const labelSt={display:"block",fontSize:11,fontWeight:700,color:"var(--muted)",marginBottom:5,textTransform:"uppercase",letterSpacing:1};
    const inputSt={width:"100%",padding:"11px 14px",background:"var(--input-bg)",border:"1.5px solid var(--border)",borderRadius:10,color:"var(--text)",fontSize:14,outline:"none"};
    const btnBlue={padding:"11px 24px",background:"var(--blue)",color:"#fff",border:"none",borderRadius:10,cursor:"pointer",fontSize:14,fontWeight:700};
    const btnSm={padding:"6px 12px",background:"var(--input-bg)",color:"var(--muted)",border:"1.5px solid var(--border)",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600};
    const h1St={margin:"0 0 22px",color:"var(--text)",fontSize:26,fontWeight:800};
    const h3St={fontSize:15,fontWeight:700,color:"var(--text)",marginBottom:10};
    const cardSt={background:"var(--card)",borderRadius:14,border:"1.5px solid var(--border)"};

    // ═══════════════════ COMPONENTS ═══════════════════
    function LiveClock() {
      const [now,setNow]=useState(new Date());
      useEffect(function(){const t=setInterval(function(){setNow(new Date());},1000);return function(){clearInterval(t);};}, []);
      return (<div style={{textAlign:"center",margin:"8px 0 18px"}}>
        <div style={{fontSize:56,fontWeight:800,fontFamily:"var(--mono)",color:"var(--blue)",letterSpacing:-3,lineHeight:1}}>
          {now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}
        </div>
        <div style={{fontSize:14,color:"var(--muted)",marginTop:6,fontWeight:500,textTransform:"capitalize"}}>
          {now.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
        </div>
      </div>);
    }

    function Toast({msg,type,onClose}) {
      useEffect(function(){const t=setTimeout(onClose,3200);return function(){clearTimeout(t);};}, [onClose]);
      const colors={success:"#16a34a",error:"#dc2626",info:"#3b82f6"};
      return (<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",zIndex:9999,
        background:colors[type]||colors.info,color:"#fff",padding:"13px 30px",borderRadius:12,
        fontSize:14,fontWeight:700,boxShadow:"0 8px 30px rgba(0,0,0,.18)",animation:"toastIn .3s ease"}}>{msg}</div>);
    }

    // ═══════════════════ MODAL ═══════════════════
    function Modal({title, onClose, children}) {
      return (<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9998,padding:20}}
        onClick={function(e){if(e.target===e.currentTarget) onClose();}}>
        <div style={{background:"var(--card)",borderRadius:18,padding:"28px 30px",width:"100%",maxWidth:440,boxShadow:"0 20px 60px rgba(0,0,0,.15)",animation:"modalIn .25s ease",border:"1.5px solid var(--border)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <h3 style={{margin:0,fontSize:18,fontWeight:800,color:"var(--text)"}}>{title}</h3>
            <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"var(--muted)",lineHeight:1}}>✕</button>
          </div>
          {children}
        </div>
      </div>);
    }

    // ═══════════════════ EMPLOYEE PUNCH PAGE ═══════════════════
    function EmployeePage({goAdmin,employees,records,refreshRecords,addRecord}) {
      const [selId,setSelId]=useState(""); const [pw,setPw]=useState(""); const [auth,setAuth]=useState(false);
      const [busy,setBusy]=useState(false); const [toast,setToast]=useState(null);
      const active=employees.filter(function(e){return e.active!=="false"&&e.active!==false;});
      const emp=employees.find(function(e){return e.id===selId;});
      const today=todayISO();
      const todayRecs=records.filter(function(r){return r.employeeId===selId&&isoDate(r.timestamp)===today;})
        .sort(function(a,b){return a.timestamp.localeCompare(b.timestamp);});

      function doAuth(){
        if(!emp) return setToast({msg:"Selecione um funcionário",type:"error"});
        if(emp.password!==pw) return setToast({msg:"Senha incorreta!",type:"error"});
        setAuth(true);
      }
      async function punch(type){
        if(busy) return; setBusy(true);
        var now=new Date().toISOString();
        var last=todayRecs[todayRecs.length-1];
        if(last&&(Date.now()-new Date(last.timestamp).getTime())<5000){setBusy(false);return setToast({msg:"Aguarde alguns segundos entre registros",type:"error"});}
        if(type==="entrada"&&last&&last.type==="entrada"){setBusy(false);return setToast({msg:"Registre a saída primeiro!",type:"error"});}
        if(type==="saida"&&(!last||last.type==="saida")){setBusy(false);return setToast({msg:"Registre a entrada primeiro!",type:"error"});}
        try {
          var saved=await fbCreate("timeRecords",{employeeId:selId,type:type,timestamp:now});
          addRecord(saved);
          setToast({msg:type==="entrada"?"✓ Entrada registrada!":"✓ Saída registrada!",type:"success"});
        } catch(e) {
          console.error("Erro ao registrar ponto:",e);
          setToast({msg:"Erro ao salvar registro. Tente novamente.",type:"error"});
        }
        setBusy(false);
      }
      function logout(){setAuth(false);setSelId("");setPw("");}

      return (<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20,background:"var(--bg)"}}>
        {toast&&<Toast msg={toast.msg} type={toast.type} onClose={function(){setToast(null);}} />}
        <button onClick={goAdmin} style={{position:"fixed",top:14,right:14,...btnSm,fontSize:11,opacity:0.5}}>⚙ Administrador</button>
        <div style={{width:"100%",maxWidth:440,background:"var(--card)",borderRadius:22,padding:"40px 34px",boxShadow:"0 4px 40px rgba(0,0,0,.06)",border:"1.5px solid var(--border)"}}>
          <div style={{textAlign:"center",marginBottom:14}}>
            <img src="logo.png" alt="Logo" style={{maxWidth:220,maxHeight:110,objectFit:"contain"}}
              onError={function(e){e.target.style.display="none";e.target.nextSibling.style.display="flex";}} />
            <div style={{display:"none",alignItems:"center",justifyContent:"center",gap:10,fontSize:24,fontWeight:800,color:"var(--blue)",fontFamily:"var(--mono)"}}>
              <span style={{background:"var(--blue)",color:"#fff",borderRadius:8,padding:"4px 10px",fontSize:16}}>PD</span> PONTO DIGITAL
            </div>
          </div>
          <LiveClock />
          {!auth?(<div style={{animation:"fadeUp .4s ease"}}>
            <div style={{marginBottom:14}}><label style={labelSt}>Funcionário</label>
              <select value={selId} onChange={function(e){setSelId(e.target.value);setPw("");}} style={{...inputSt,cursor:"pointer"}}>
                <option value="">Selecione seu nome...</option>
                {active.map(function(e){return <option key={e.id} value={e.id}>{e.name}</option>;})}
              </select>
            </div>
            <div style={{marginBottom:24}}><label style={labelSt}>Senha</label>
              <input type="password" value={pw} onChange={function(e){setPw(e.target.value);}}
                onKeyDown={function(e){if(e.key==="Enter")doAuth();}} placeholder="••••••" style={inputSt} />
            </div>
            <button onClick={doAuth} style={{...btnBlue,width:"100%",padding:15,fontSize:16}}>Acessar</button>
          </div>):(<div style={{animation:"fadeUp .4s ease"}}>
            <div style={{textAlign:"center",padding:"10px 0 18px",borderBottom:"1.5px solid var(--border)",marginBottom:22}}>
              <div style={{fontSize:12,color:"var(--muted)",marginBottom:2,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Bem-vindo(a),</div>
              <div style={{fontSize:24,fontWeight:800,color:"var(--text)"}}>{emp&&emp.name}</div>
              {emp&&emp.cargo&&<div style={{fontSize:13,color:"var(--muted)",marginTop:2}}>{emp.cargo}</div>}
            </div>
            <div style={{display:"flex",gap:14,marginBottom:24}}>
              <button onClick={function(){punch("entrada");}} disabled={busy} style={{flex:1,padding:"20px 8px",background:"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",border:"none",borderRadius:16,cursor:busy?"wait":"pointer",fontSize:15,fontWeight:800,opacity:busy?.6:1,boxShadow:"0 4px 16px rgba(22,163,74,.25)"}}>
                <span style={{fontSize:22,display:"block",marginBottom:4}}>▶</span>Entrada</button>
              <button onClick={function(){punch("saida");}} disabled={busy} style={{flex:1,padding:"20px 8px",background:"linear-gradient(135deg,#dc2626,#b91c1c)",color:"#fff",border:"none",borderRadius:16,cursor:busy?"wait":"pointer",fontSize:15,fontWeight:800,opacity:busy?.6:1,boxShadow:"0 4px 16px rgba(220,38,38,.25)"}}>
                <span style={{fontSize:22,display:"block",marginBottom:4}}>■</span>Saída</button>
            </div>
            {todayRecs.length>0&&(<div style={{marginBottom:20}}>
              <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Registros de Hoje</div>
              <div style={{background:"var(--input-bg)",borderRadius:12,padding:10,maxHeight:160,overflowY:"auto"}}>
                {todayRecs.map(function(r){return (<div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderRadius:8,marginBottom:3,background:r.type==="entrada"?"rgba(22,163,106,.06)":"rgba(220,38,38,.06)"}}>
                  <span style={{fontSize:12,fontWeight:700,color:r.type==="entrada"?"#16a34a":"#dc2626"}}>{r.type==="entrada"?"▶ Entrada":"■ Saída"}</span>
                  <span style={{fontSize:14,fontFamily:"var(--mono)",fontWeight:600,color:"var(--text)"}}>{fmtTime(r.timestamp)}</span>
                </div>);})}
              </div>
              <div style={{textAlign:"right",marginTop:10,fontSize:14,fontWeight:800,color:"var(--blue)"}}>Hoje: {fmtMs(calcHours(todayRecs))}</div>
            </div>)}
            <button onClick={logout} style={{width:"100%",padding:12,background:"transparent",border:"1.5px solid var(--border)",color:"var(--muted)",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:600}}>← Sair</button>
          </div>)}
        </div>
        <div style={{marginTop:14,fontSize:11,color:"var(--muted)",opacity:.35}}>Ponto Digital v3.0</div>
      </div>);
    }

    // ═══════════════════ ADMIN LOGIN ═══════════════════
    function AdminLogin({onLogin,goBack}) {
      const [pw,setPw]=useState(""); const [err,setErr]=useState(""); const [loading,setLoading]=useState(false);
      async function handleLogin(){
        setLoading(true);
        const admin=await fbGet("settings","admin"); const stored=admin?admin.password:"admin123";
        if(pw===stored){onLogin();}else{setErr("Senha incorreta!");setTimeout(function(){setErr("");},2500);}
        setLoading(false);
      }
      return (<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",padding:20}}>
        <div style={{width:"100%",maxWidth:380,background:"var(--card)",borderRadius:22,padding:"40px 34px",boxShadow:"0 4px 40px rgba(0,0,0,.06)",border:"1.5px solid var(--border)"}}>
          <div style={{textAlign:"center",marginBottom:26}}>
            <div style={{width:60,height:60,borderRadius:16,background:"linear-gradient(135deg,#3b82f6,#2563eb)",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:28,marginBottom:14,color:"#fff",boxShadow:"0 4px 20px rgba(59,130,246,.3)"}}>🔒</div>
            <h2 style={{margin:0,color:"var(--text)",fontSize:22,fontWeight:800}}>Painel Administrativo</h2>
            <p style={{margin:"4px 0 0",color:"var(--muted)",fontSize:13}}>Acesso restrito</p>
          </div>
          {err&&<div style={{background:"#fef2f2",color:"#dc2626",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:14,textAlign:"center",fontWeight:600,border:"1px solid #fecaca"}}>{err}</div>}
          <div style={{marginBottom:20}}><label style={labelSt}>Senha</label>
            <input type="password" value={pw} onChange={function(e){setPw(e.target.value);}}
              onKeyDown={function(e){if(e.key==="Enter")handleLogin();}} placeholder="••••••" style={inputSt} />
          </div>
          <button onClick={handleLogin} disabled={loading} style={{...btnBlue,width:"100%",padding:15,fontSize:15,opacity:loading?.7:1}}>{loading?"Verificando...":"Entrar"}</button>
          <button onClick={goBack} style={{width:"100%",marginTop:10,padding:12,background:"transparent",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:13}}>← Voltar ao Ponto</button>
          <div style={{marginTop:18,padding:12,background:"var(--input-bg)",borderRadius:10,fontSize:11,color:"var(--muted)",textAlign:"center",border:"1px solid var(--border)"}}>Senha padrão: <b style={{color:"var(--text)"}}>admin123</b></div>
        </div>
      </div>);
    }

    // ═══════════════════ ADMIN DASHBOARD ═══════════════════
    function AdminDashboard({goBack,employees,records,refreshAll}) {
      const [tab,setTab]=useState("painel"); const [toast,setToast]=useState(null);
      const [editing,setEditing]=useState(null); const [form,setForm]=useState({name:"",password:"",cargo:""});
      const [viewId,setViewId]=useState(null); const [pdfBusy,setPdfBusy]=useState(false);
      const [month,setMonth]=useState(function(){const n=new Date();return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0");});
      const [adminPw,setAdminPw]=useState({cur:"",next:"",confirm:""});
      const [savingEmp,setSavingEmp]=useState(false);

      // MODAL states for record editing
      const [editModal,setEditModal]=useState(null); // { record, newDate, newTime }
      const [addModal,setAddModal]=useState(null);   // { empId, date, time, type }
      const [actionBusy,setActionBusy]=useState(false);

      const today=todayISO();
      const active=employees.filter(function(e){return e.active!=="false"&&e.active!==false;});

      function getMonthRecs(empId){
        return records.filter(function(r){return r.employeeId===empId&&r.timestamp.startsWith(month);})
          .sort(function(a,b){return a.timestamp.localeCompare(b.timestamp);});
      }
      function groupByDate(recs){
        const g={};recs.forEach(function(r){const d=isoDate(r.timestamp);if(!g[d])g[d]=[];g[d].push(r);});
        return Object.entries(g).sort(function([a],[b]){return a.localeCompare(b);});
      }

      const todayActivity=active.map(function(emp){
        const recs=records.filter(function(r){return r.employeeId===emp.id&&isoDate(r.timestamp)===today;})
          .sort(function(a,b){return a.timestamp.localeCompare(b.timestamp);});
        return {emp:emp,recs:recs,last:recs[recs.length-1]};
      }).filter(function(x){return x.recs.length>0;});

      // EMPLOYEE CRUD
      async function saveEmp(){
        if(!form.name.trim()) return setToast({msg:"Nome obrigatório",type:"error"});
        if(!form.password.trim()) return setToast({msg:"Senha obrigatória",type:"error"});
        setSavingEmp(true);
        try{
          if(editing){
            await fbUpdate("employees",editing.id,{name:form.name,password:form.password,cargo:form.cargo});
            setToast({msg:"Atualizado!",type:"success"});
          }else{
            await fbCreate("employees",{name:form.name,password:form.password,cargo:form.cargo,active:"true",createdAt:new Date().toISOString()});
            setToast({msg:"Cadastrado!",type:"success"});
          }
          await refreshAll(); setEditing(null); setForm({name:"",password:"",cargo:""});
        }catch(e){console.error("saveEmp:",e);setToast({msg:"Erro ao salvar funcionário. Tente novamente.",type:"error"});}
        setSavingEmp(false);
      }
      async function toggleEmp(emp){
        var na=(emp.active==="false"||emp.active===false)?"true":"false";
        try{
          await fbUpdate("employees",emp.id,{active:na}); await refreshAll();
          setToast({msg:na==="true"?"Reativado!":"Desativado!",type:"info"});
        }catch(e){console.error("toggleEmp:",e);setToast({msg:"Erro ao alterar status. Tente novamente.",type:"error"});}
      }
      async function deleteEmp(emp){
        if(!confirm('Remover "'+emp.name+'" permanentemente?')) return;
        try{
          var empRecs=records.filter(function(r){return r.employeeId===emp.id;});
          for(var i=0;i<empRecs.length;i++) await fbDelete("timeRecords",empRecs[i].id);
          await fbDelete("employees",emp.id); await refreshAll();
          setToast({msg:"Removido",type:"success"});
        }catch(e){console.error("deleteEmp:",e);setToast({msg:"Erro ao remover. Tente novamente.",type:"error"});}
      }

      // ═══ RECORD MANAGEMENT ═══
      async function deleteRecord(rec){
        if(!confirm("Excluir este registro de "+rec.type+" ("+fmtTime(rec.timestamp)+")?")) return;
        setActionBusy(true);
        try{
          await fbDelete("timeRecords",rec.id); await refreshAll();
          setToast({msg:"Registro excluído!",type:"success"});
        }catch(e){console.error("deleteRecord:",e);setToast({msg:"Erro ao excluir registro.",type:"error"});}
        setActionBusy(false);
      }

      function openEditModal(rec){
        const d=new Date(rec.timestamp);
        setEditModal({
          record:rec,
          newDate:isoDate(rec.timestamp),
          newTime:String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")
        });
      }

      async function saveEditRecord(){
        if(!editModal) return;
        setActionBusy(true);
        try{
          var newTimestamp=new Date(editModal.newDate+"T"+editModal.newTime+":00").toISOString();
          await fbUpdate("timeRecords",editModal.record.id,{timestamp:newTimestamp});
          await refreshAll();
          setEditModal(null);
          setToast({msg:"Registro atualizado!",type:"success"});
        }catch(e){console.error("saveEditRecord:",e);setToast({msg:"Erro ao atualizar registro.",type:"error"});}
        setActionBusy(false);
      }

      function openAddModal(empId){
        const now=new Date();
        setAddModal({
          empId:empId,
          date:todayISO(),
          time:String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0"),
          type:"entrada"
        });
      }

      async function saveAddRecord(){
        if(!addModal) return;
        setActionBusy(true);
        try{
          var newTimestamp=new Date(addModal.date+"T"+addModal.time+":00").toISOString();
          await fbCreate("timeRecords",{employeeId:addModal.empId,type:addModal.type,timestamp:newTimestamp});
          await refreshAll();
          setAddModal(null);
          setToast({msg:"Registro adicionado!",type:"success"});
        }catch(e){console.error("saveAddRecord:",e);setToast({msg:"Erro ao adicionar registro.",type:"error"});}
        setActionBusy(false);
      }

      // PDF & CSV
      async function downloadPDF(emp){
        setPdfBusy(true); const recs=getMonthRecs(emp.id);
        if(recs.length===0){setToast({msg:"Sem registros",type:"error"});setPdfBusy(false);return;}
        const parts=month.split("-"); generatePDF(emp,recs,parts[1]+"/"+parts[0]);
        setToast({msg:"PDF gerado!",type:"success"}); setPdfBusy(false);
      }
      async function downloadAllPDFs(){
        setPdfBusy(true); const parts=month.split("-"); let count=0;
        for(const emp of active){const recs=getMonthRecs(emp.id);if(recs.length>0){generatePDF(emp,recs,parts[1]+"/"+parts[0]);count++;}}
        setToast({msg:count>0?count+" PDF(s)!":"Nenhum registro",type:count>0?"success":"error"}); setPdfBusy(false);
      }
      function exportCSV(){
        let csv="Funcionário,Cargo,Data,Tipo,Horário\n";
        active.forEach(function(emp){getMonthRecs(emp.id).forEach(function(r){
          csv+='"'+emp.name+'","'+(emp.cargo||"")+'","'+fmtDateBR(isoDate(r.timestamp))+'","'+r.type+'","'+fmtTime(r.timestamp)+'"\n';
        });});
        const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}));a.download="relatorio-"+month+".csv";a.click();
        setToast({msg:"CSV exportado!",type:"success"});
      }

      // Admin pw
      async function changeAdminPw(){
        try{
          var admin=await fbGet("settings","admin"); var stored=admin?admin.password:"admin123";
          if(adminPw.cur!==stored) return setToast({msg:"Senha atual incorreta",type:"error"});
          if(adminPw.next.length<4) return setToast({msg:"Mínimo 4 caracteres",type:"error"});
          if(adminPw.next!==adminPw.confirm) return setToast({msg:"Senhas não conferem",type:"error"});
          if(admin) await fbUpdate("settings","admin",{password:adminPw.next});
          else await fbCreate("settings",{password:adminPw.next},"admin");
          setAdminPw({cur:"",next:"",confirm:""}); setToast({msg:"Senha alterada!",type:"success"});
        }catch(e){console.error("changeAdminPw:",e);setToast({msg:"Erro ao alterar senha. Tente novamente.",type:"error"});}
      }

      const [cleaningMonth,setCleaningMonth]=useState(false);
      async function cleanLastMonth(){
        var now=new Date();
        var prevMonth=now.getMonth()===0?12:now.getMonth();
        var prevYear=now.getMonth()===0?now.getFullYear()-1:now.getFullYear();
        var prevLabel=String(prevMonth).padStart(2,"0")+"/"+prevYear;
        if(!confirm("Tem certeza que deseja apagar TODOS os registros de "+prevLabel+"?\n\nEssa ação é IRREVERSÍVEL. Certifique-se de ter exportado o relatório (PDF/CSV) antes de continuar.")) return;
        setCleaningMonth(true);
        try{
          var toDelete=records.filter(function(r){
            var d=new Date(r.timestamp);
            return d.getMonth()+1===prevMonth&&d.getFullYear()===prevYear;
          });
          if(toDelete.length===0){setCleaningMonth(false);return setToast({msg:"Nenhum registro encontrado em "+prevLabel,type:"info"});}
          for(var i=0;i<toDelete.length;i++) await fbDelete("timeRecords",toDelete[i].id);
          await refreshAll();
          setToast({msg:toDelete.length+" registro(s) de "+prevLabel+" removido(s)!",type:"success"});
        }catch(e){console.error("cleanLastMonth:",e);setToast({msg:"Erro ao limpar registros. Tente novamente.",type:"error"});}
        setCleaningMonth(false);
      }

      const tabs=[{id:"painel",label:"📊 Painel"},{id:"funcionarios",label:"👥 Funcionários"},{id:"relatorios",label:"📋 Relatórios"},{id:"config",label:"⚙ Configurações"}];

      return (<div style={{minHeight:"100vh",background:"var(--bg)",display:"flex"}}>
        {toast&&<Toast msg={toast.msg} type={toast.type} onClose={function(){setToast(null);}} />}

        {/* EDIT MODAL */}
        {editModal&&<Modal title="✏️ Editar Registro" onClose={function(){setEditModal(null);}}>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:13,color:"var(--muted)",marginBottom:10}}>
              Registro atual: <b style={{color:editModal.record.type==="entrada"?"#16a34a":"#dc2626"}}>{editModal.record.type}</b> — {fmtTime(editModal.record.timestamp)}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><label style={labelSt}>Nova Data</label>
                <input type="date" value={editModal.newDate} onChange={function(e){setEditModal({...editModal,newDate:e.target.value});}} style={inputSt} />
              </div>
              <div><label style={labelSt}>Novo Horário</label>
                <input type="time" value={editModal.newTime} onChange={function(e){setEditModal({...editModal,newTime:e.target.value});}} style={inputSt} />
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={saveEditRecord} disabled={actionBusy} style={{...btnBlue,opacity:actionBusy?.6:1}}>{actionBusy?"Salvando...":"✓ Salvar Alteração"}</button>
            <button onClick={function(){setEditModal(null);}} style={btnSm}>Cancelar</button>
          </div>
        </Modal>}

        {/* ADD MODAL */}
        {addModal&&<Modal title="➕ Adicionar Registro Manual" onClose={function(){setAddModal(null);}}>
          <div style={{marginBottom:14}}>
            <div style={{marginBottom:12}}><label style={labelSt}>Tipo</label>
              <div style={{display:"flex",gap:8}}>
                <button onClick={function(){setAddModal({...addModal,type:"entrada"});}}
                  style={{flex:1,padding:"10px",borderRadius:10,border:"2px solid",cursor:"pointer",fontWeight:700,fontSize:14,
                    borderColor:addModal.type==="entrada"?"#16a34a":"var(--border)",
                    background:addModal.type==="entrada"?"#f0fdf4":"var(--input-bg)",
                    color:addModal.type==="entrada"?"#16a34a":"var(--muted)"}}>▶ Entrada</button>
                <button onClick={function(){setAddModal({...addModal,type:"saida"});}}
                  style={{flex:1,padding:"10px",borderRadius:10,border:"2px solid",cursor:"pointer",fontWeight:700,fontSize:14,
                    borderColor:addModal.type==="saida"?"#dc2626":"var(--border)",
                    background:addModal.type==="saida"?"#fef2f2":"var(--input-bg)",
                    color:addModal.type==="saida"?"#dc2626":"var(--muted)"}}>■ Saída</button>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><label style={labelSt}>Data</label>
                <input type="date" value={addModal.date} onChange={function(e){setAddModal({...addModal,date:e.target.value});}} style={inputSt} />
              </div>
              <div><label style={labelSt}>Horário</label>
                <input type="time" value={addModal.time} onChange={function(e){setAddModal({...addModal,time:e.target.value});}} style={inputSt} />
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={saveAddRecord} disabled={actionBusy} style={{...btnBlue,opacity:actionBusy?.6:1}}>{actionBusy?"Salvando...":"✓ Adicionar Registro"}</button>
            <button onClick={function(){setAddModal(null);}} style={btnSm}>Cancelar</button>
          </div>
        </Modal>}

        {/* SIDEBAR */}
        <div style={{width:230,background:"var(--card)",borderRight:"1.5px solid var(--border)",padding:"22px 0",display:"flex",flexDirection:"column",flexShrink:0,boxShadow:"2px 0 20px rgba(0,0,0,.03)"}}>
          <div style={{padding:"0 18px 20px",borderBottom:"1.5px solid var(--border)"}}>
            <div style={{fontSize:17,fontWeight:800,color:"var(--blue)",fontFamily:"var(--mono)"}}>PONTO DIGITAL</div>
            <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>Painel Administrativo</div>
          </div>
          <div style={{padding:"14px 10px",flex:1}}>
            {tabs.map(function(t){return <button key={t.id} onClick={function(){setTab(t.id);setViewId(null);setEditing(null);setForm({name:"",password:"",cargo:""});}} style={{
              display:"block",width:"100%",padding:"11px 14px",marginBottom:3,background:tab===t.id?"var(--blue)":"transparent",
              color:tab===t.id?"#fff":"var(--text-light)",border:"none",borderRadius:10,cursor:"pointer",textAlign:"left",fontSize:14,fontWeight:tab===t.id?700:500}}>{t.label}</button>;})}
          </div>
          <div style={{padding:"14px 10px"}}>
            <button onClick={goBack} style={{display:"block",width:"100%",padding:"11px 14px",background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:700}}>← Sair do Admin</button>
          </div>
        </div>

        {/* CONTENT */}
        <div style={{flex:1,padding:"28px 32px",overflowY:"auto",maxHeight:"100vh"}}>

          {/* PAINEL */}
          {tab==="painel"&&(<div style={{animation:"fadeUp .3s ease"}}>
            <h1 style={h1St}>Painel Geral</h1>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(170px, 1fr))",gap:14,marginBottom:28}}>
              {[{label:"Funcionários Ativos",val:active.length,c:"#3b82f6",bg:"#eff6ff",bc:"#bfdbfe"},
                {label:"Presentes Agora",val:todayActivity.filter(function(x){return x.last&&x.last.type==="entrada";}).length,c:"#16a34a",bg:"#f0fdf4",bc:"#bbf7d0"},
                {label:"Registros Hoje",val:todayActivity.length,c:"#f59e0b",bg:"#fffbeb",bc:"#fde68a"}
              ].map(function(s,i){return <div key={i} style={{background:s.bg,borderRadius:16,padding:"20px 22px",border:"1.5px solid "+s.bc}}>
                <div style={{fontSize:36,fontWeight:800,color:s.c,fontFamily:"var(--mono)",lineHeight:1}}>{s.val}</div>
                <div style={{fontSize:11,color:s.c,fontWeight:700,marginTop:6,textTransform:"uppercase",letterSpacing:.5,opacity:.8}}>{s.label}</div>
              </div>;})}
            </div>
            <h3 style={h3St}>Atividade de Hoje</h3>
            <div style={cardSt}>
              {todayActivity.length===0?(<div style={{padding:32,textAlign:"center",color:"var(--muted)"}}>Nenhum registro hoje.</div>)
              :todayActivity.map(function(item){return <div key={item.emp.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 20px",borderBottom:"1px solid var(--border)"}}>
                <div><div style={{fontWeight:700,color:"var(--text)",fontSize:14}}>{item.emp.name}</div>
                  <div style={{fontSize:11,color:"var(--muted)"}}>{item.emp.cargo||"\u2014"}</div></div>
                <div style={{textAlign:"right"}}>
                  <span style={{fontSize:11,fontWeight:700,padding:"3px 12px",borderRadius:20,background:item.last&&item.last.type==="entrada"?"#dcfce7":"#fef2f2",color:item.last&&item.last.type==="entrada"?"#16a34a":"#dc2626"}}>{item.last&&item.last.type==="entrada"?"● Presente":"○ Saiu"}</span>
                  <div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>{item.recs.length} reg. — {fmtMs(calcHours(item.recs))}</div>
                </div>
              </div>;})}
            </div>
          </div>)}

          {/* FUNCIONÁRIOS */}
          {tab==="funcionarios"&&!viewId&&(<div style={{animation:"fadeUp .3s ease"}}>
            <h1 style={h1St}>{editing?"Editar Funcionário":"Funcionários"}</h1>
            <div style={{...cardSt,padding:24,marginBottom:22}}>
              <h3 style={{...h3St,margin:"0 0 14px"}}>{editing?"Editando: "+editing.name:"Cadastrar Novo"}</h3>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                <div><label style={labelSt}>Nome</label><input value={form.name} onChange={function(e){setForm({...form,name:e.target.value});}} style={inputSt} placeholder="Nome completo" /></div>
                <div><label style={labelSt}>Cargo</label><input value={form.cargo} onChange={function(e){setForm({...form,cargo:e.target.value});}} style={inputSt} placeholder="Ex: Analista" /></div>
                <div><label style={labelSt}>Senha</label><input value={form.password} onChange={function(e){setForm({...form,password:e.target.value});}} style={inputSt} placeholder="Senha" /></div>
              </div>
              <div style={{display:"flex",gap:8,marginTop:16}}>
                <button onClick={saveEmp} disabled={savingEmp} style={{...btnBlue,opacity:savingEmp?.6:1}}>{savingEmp?"Salvando...":editing?"✓ Salvar":"✓ Cadastrar"}</button>
                {editing&&<button onClick={function(){setEditing(null);setForm({name:"",password:"",cargo:""});}} style={btnSm}>Cancelar</button>}
              </div>
            </div>
            <div style={{...cardSt,overflow:"hidden"}}>
              <div style={{padding:"12px 20px",display:"grid",gridTemplateColumns:"2fr 1fr 80px 180px",fontSize:11,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:.5,borderBottom:"2px solid var(--border)",background:"var(--input-bg)"}}>
                <span>Nome</span><span>Cargo</span><span>Status</span><span style={{textAlign:"right"}}>Ações</span>
              </div>
              {employees.length===0?(<div style={{padding:32,textAlign:"center",color:"var(--muted)"}}>Nenhum funcionário</div>)
              :employees.map(function(emp){
                const isA=emp.active!=="false"&&emp.active!==false;
                return <div key={emp.id} style={{padding:"13px 20px",display:"grid",gridTemplateColumns:"2fr 1fr 80px 180px",alignItems:"center",borderBottom:"1px solid var(--border)",opacity:isA?1:.45}}>
                  <span style={{fontWeight:700,color:"var(--text)",fontSize:14}}>{emp.name}</span>
                  <span style={{color:"var(--muted)",fontSize:13}}>{emp.cargo||"\u2014"}</span>
                  <span><span style={{fontSize:11,padding:"3px 10px",borderRadius:20,fontWeight:700,background:isA?"#dcfce7":"#fef2f2",color:isA?"#16a34a":"#dc2626"}}>{isA?"Ativo":"Inativo"}</span></span>
                  <div style={{display:"flex",gap:5,justifyContent:"flex-end"}}>
                    <button onClick={function(){setViewId(emp.id);}} style={btnSm}>📊</button>
                    <button onClick={function(){setEditing(emp);setForm({name:emp.name,password:emp.password||"",cargo:emp.cargo||""});}} style={btnSm}>✏️</button>
                    <button onClick={function(){toggleEmp(emp);}} style={btnSm}>{isA?"🚫":"✅"}</button>
                    <button onClick={function(){deleteEmp(emp);}} style={{...btnSm,background:"#fef2f2",borderColor:"#fecaca",color:"#dc2626"}}>🗑️</button>
                  </div>
                </div>;})}
            </div>
          </div>)}

          {/* EMPLOYEE DETAIL WITH RECORD MANAGEMENT */}
          {tab==="funcionarios"&&viewId&&(function(){
            const emp=employees.find(function(e){return e.id===viewId;});
            if(!emp) return null;
            const monthRecs=getMonthRecs(emp.id);
            const grouped=groupByDate(monthRecs);
            return (<div style={{animation:"fadeUp .3s ease"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:22}}>
                <button onClick={function(){setViewId(null);}} style={{...btnSm,fontSize:16,padding:"6px 14px"}}>←</button>
                <h1 style={{...h1St,margin:0}}>{emp.name}</h1>
                {emp.cargo&&<span style={{fontSize:13,color:"var(--blue)",background:"#eff6ff",padding:"4px 14px",borderRadius:20,fontWeight:600,border:"1px solid #bfdbfe"}}>{emp.cargo}</span>}
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:20,flexWrap:"wrap"}}>
                <input type="month" value={month} onChange={function(e){setMonth(e.target.value);}} style={{...inputSt,width:190}} />
                <button onClick={function(){openAddModal(emp.id);}} style={{...btnBlue,background:"#16a34a"}}>➕ Adicionar Registro</button>
                <button onClick={function(){downloadPDF(emp);}} disabled={pdfBusy} style={{...btnBlue,opacity:pdfBusy?.6:1}}>{pdfBusy?"...":"📄 PDF"}</button>
                <div style={{marginLeft:"auto",fontSize:18,fontWeight:800,color:"var(--blue)",fontFamily:"var(--mono)"}}>Total: {fmtMs(calcHours(monthRecs))}</div>
              </div>

              {/* LEGEND */}
              <div style={{display:"flex",gap:16,marginBottom:12,fontSize:12,color:"var(--muted)",fontWeight:600}}>
                <span>✏️ = Editar horário</span>
                <span>🗑️ = Excluir registro</span>
                <span>➕ = Adicionar registro manual</span>
              </div>

              <div style={{...cardSt,overflow:"hidden"}}>
                {grouped.length===0?(<div style={{padding:32,textAlign:"center",color:"var(--muted)"}}>Sem registros neste mês</div>)
                :grouped.map(function([date,recs]){
                  return <div key={date} style={{borderBottom:"1.5px solid var(--border)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",padding:"10px 20px",background:"var(--input-bg)",fontSize:13}}>
                      <span style={{fontWeight:800,color:"var(--text)"}}>{fmtDateBR(date)}</span>
                      <span style={{color:"var(--blue)",fontWeight:800,fontFamily:"var(--mono)"}}>{fmtMs(calcHours(recs))}</span>
                    </div>
                    {recs.sort(function(a,b){return a.timestamp.localeCompare(b.timestamp);}).map(function(r){
                      return <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 20px 8px 36px",fontSize:13}}>
                        <span style={{fontWeight:600,color:r.type==="entrada"?"#16a34a":"#dc2626"}}>
                          {r.type==="entrada"?"▶ Entrada":"■ Saída"}
                        </span>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontFamily:"var(--mono)",color:"var(--text)",fontWeight:600}}>{fmtTime(r.timestamp)}</span>
                          <button onClick={function(){openEditModal(r);}} disabled={actionBusy} style={{...btnSm,padding:"4px 8px",fontSize:11}} title="Editar horário">✏️</button>
                          <button onClick={function(){deleteRecord(r);}} disabled={actionBusy} style={{...btnSm,padding:"4px 8px",fontSize:11,background:"#fef2f2",borderColor:"#fecaca",color:"#dc2626"}} title="Excluir">🗑️</button>
                        </div>
                      </div>;
                    })}
                  </div>;
                })}
              </div>
            </div>);
          })()}

          {/* RELATÓRIOS */}
          {tab==="relatorios"&&(<div style={{animation:"fadeUp .3s ease"}}>
            <h1 style={h1St}>Relatórios</h1>
            <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:22,flexWrap:"wrap",padding:18,...cardSt}}>
              <div><label style={{...labelSt,marginBottom:4}}>Mês/Ano</label>
                <input type="month" value={month} onChange={function(e){setMonth(e.target.value);}} style={{...inputSt,width:180}} /></div>
              <div style={{display:"flex",gap:8,alignItems:"flex-end",paddingTop:18}}>
                <button onClick={exportCSV} style={btnBlue}>📥 CSV</button>
                <button onClick={downloadAllPDFs} disabled={pdfBusy} style={{...btnBlue,background:"linear-gradient(135deg,#7c3aed,#6d28d9)",opacity:pdfBusy?.6:1}}>{pdfBusy?"...":"📄 PDF de Todos"}</button>
              </div>
            </div>
            <div style={{...cardSt,overflow:"hidden"}}>
              <div style={{padding:"12px 20px",display:"grid",gridTemplateColumns:"2fr 1fr 70px 100px 140px",fontSize:11,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:.5,borderBottom:"2px solid var(--border)",background:"var(--input-bg)"}}>
                <span>Funcionário</span><span>Cargo</span><span>Dias</span><span>Horas</span><span style={{textAlign:"right"}}>Ações</span>
              </div>
              {active.map(function(emp){const recs=getMonthRecs(emp.id);const grp=groupByDate(recs);
                return <div key={emp.id} style={{padding:"14px 20px",display:"grid",gridTemplateColumns:"2fr 1fr 70px 100px 140px",alignItems:"center",borderBottom:"1px solid var(--border)"}}>
                  <span style={{fontWeight:700,color:"var(--text)",fontSize:14}}>{emp.name}</span>
                  <span style={{color:"var(--muted)",fontSize:13}}>{emp.cargo||"\u2014"}</span>
                  <span style={{fontWeight:800,fontSize:14}}>{grp.length}</span>
                  <span style={{fontWeight:800,fontSize:14,color:"var(--blue)",fontFamily:"var(--mono)"}}>{fmtMs(calcHours(recs))}</span>
                  <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                    <button onClick={function(){setTab("funcionarios");setViewId(emp.id);}} style={btnSm}>📊</button>
                    <button onClick={function(){downloadPDF(emp);}} disabled={pdfBusy} style={{...btnSm,background:"#eff6ff",color:"#3b82f6",borderColor:"#bfdbfe",fontWeight:700}}>PDF</button>
                  </div>
                </div>;})}
            </div>
          </div>)}

          {/* CONFIG */}
          {tab==="config"&&(<div style={{animation:"fadeUp .3s ease"}}>
            <h1 style={h1St}>Configurações</h1>
            <div style={{...cardSt,padding:24,maxWidth:420,marginBottom:22}}>
              <h3 style={{...h3St,margin:"0 0 16px"}}>🔐 Alterar Senha do Admin</h3>
              <div style={{marginBottom:12}}><label style={labelSt}>Atual</label><input type="password" value={adminPw.cur} onChange={function(e){setAdminPw({...adminPw,cur:e.target.value});}} style={inputSt} /></div>
              <div style={{marginBottom:12}}><label style={labelSt}>Nova</label><input type="password" value={adminPw.next} onChange={function(e){setAdminPw({...adminPw,next:e.target.value});}} style={inputSt} /></div>
              <div style={{marginBottom:16}}><label style={labelSt}>Confirmar</label><input type="password" value={adminPw.confirm} onChange={function(e){setAdminPw({...adminPw,confirm:e.target.value});}} style={inputSt} /></div>
              <button onClick={changeAdminPw} style={btnBlue}>Salvar</button>
            </div>
            <div style={{...cardSt,padding:24,maxWidth:420,marginBottom:22}}>
              <h3 style={{...h3St,margin:"0 0 10px"}}>🗑️ Limpar Registros do Mês Anterior</h3>
              <p style={{fontSize:13,color:"var(--text-light)",lineHeight:1.6,margin:"0 0 16px"}}>
                Remove todos os registros de ponto do mês anterior ao atual. <b>Exporte o relatório (PDF/CSV) antes de limpar.</b>
              </p>
              <button onClick={cleanLastMonth} disabled={cleaningMonth} style={{
                ...btnBlue,background:cleaningMonth?"#94a3b8":"linear-gradient(135deg, #dc2626, #b91c1c)",
                cursor:cleaningMonth?"wait":"pointer",opacity:cleaningMonth?0.7:1
              }}>
                {cleaningMonth?"Limpando...":"Limpar Mês Anterior"}
              </button>
            </div>
            <div style={{...cardSt,padding:24,maxWidth:420}}>
              <h3 style={{...h3St,margin:"0 0 10px"}}>ℹ️ Sistema</h3>
              <div style={{fontSize:13,color:"var(--text-light)",lineHeight:2}}>
                <b>Ponto Digital v3.0</b><br />
                Projeto: <code style={{fontSize:12,background:"var(--input-bg)",padding:"2px 8px",borderRadius:4}}>{PROJECT_ID}</code><br />
                Funcionários: <b>{employees.length}</b> ({active.length} ativos)<br />
                Registros: <b>{records.length}</b><br />☁️ Firebase Firestore
              </div>
            </div>
          </div>)}
        </div>
      </div>);
    }

    // ═══════════════════ APP ═══════════════════
    function App() {
      const [page,setPage]=useState("employee");
      const [employees,setEmployees]=useState([]);
      const [records,setRecords]=useState([]);
      const [loading,setLoading]=useState(true);

      const fetchAll=useCallback(async function(){
        const [e,r]=await Promise.all([fbList("employees"),fbList("timeRecords")]);
        setEmployees(e);setRecords(r);
      },[]);
      const fetchRecords=useCallback(async function(){const r=await fbList("timeRecords");setRecords(r);},[]);
      const addRecord=useCallback(function(rec){setRecords(function(prev){return prev.concat([rec]);});},[]);

      useEffect(function(){fetchAll().then(function(){setLoading(false);});},[fetchAll]);

      if(loading) return (<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
        <div style={{textAlign:"center"}}>
          <div style={{width:44,height:44,border:"4px solid #e2e8f0",borderTopColor:"#3b82f6",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 18px"}}></div>
          <div style={{fontSize:15,color:"#64748b",fontWeight:600}}>Conectando ao Firebase...</div>
        </div>
      </div>);

      if(page==="employee") return <EmployeePage goAdmin={function(){setPage("adminLogin");}} employees={employees} records={records} refreshRecords={fetchRecords} addRecord={addRecord} />;
      if(page==="adminLogin") return <AdminLogin onLogin={function(){setPage("admin");}} goBack={function(){setPage("employee");}} />;
      if(page==="admin") return <AdminDashboard goBack={function(){setPage("employee");}} employees={employees} records={records} refreshAll={fetchAll} />;
      return null;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
